name: Full UI

on:
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'

concurrency:
  group: full-ui-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Keep manual/nightly shards on the same stable host-compatible toolchain as
  # the blocking smoke workflow so build and UI launch behavior are equivalent.
  DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

jobs:
  ui-stage:
    name: Full UI shard ${{ matrix.shard }}
    runs-on: macos-26
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        shard: [capture, history, relaunch, row-actions, settings]
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Install verification tools
        shell: bash
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            rg --version
            exit 0
          fi
          if brew tap | /usr/bin/grep -Fxq 'aws/tap'; then
            brew untap aws/tap
          fi
          brew install ripgrep

      - name: Verify noninteractive UI automation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NextPasteFullUI"
          automation_mode_status="$(/usr/bin/automationmodetool)"
          printf '%s\n' "$automation_mode_status" \
            | tee "$RUNNER_TEMP/NextPasteFullUI/automation-mode.log"
          if [[ "$automation_mode_status" != *"DOES NOT REQUIRE"* ]]; then
            echo "error: hosted runner requires interactive UI Automation authorization" >&2
            exit 1
          fi

      - name: Run bounded full UI stage
        timeout-minutes: 14
        shell: bash
        env:
          CI_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteFullUI
          CI_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteDerivedData
        run: Scripts/ci-test.sh --mode full-ui --shard "${{ matrix.shard }}"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nextpaste-full-ui-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteFullUI
          if-no-files-found: warn
          retention-days: 14
