name: Full UI

on:
  workflow_run:
    workflows: [Verify]
    types: [completed]
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 18 * * *'

concurrency:
  group: full-ui-${{ github.event_name }}-${{ github.event.workflow_run.event || github.ref }}-${{ github.event.workflow_run.conclusion || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Keep manual/nightly shards on the same stable host-compatible toolchain as
  # the blocking smoke workflow so build and UI launch behavior are equivalent.
  DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

jobs:
  ui-stage:
    name: Full UI shard ${{ matrix.shard }}
    # workflow_run has the base repository's trust context. Reject fork heads
    # before allocating a runner or checking out any repository-controlled code.
    if: >-
      ${{
        github.event_name != 'workflow_run' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_repository.full_name == github.repository &&
          github.event.workflow_run.head_branch == 'main'
        )
      }}
    runs-on: macos-26
    timeout-minutes: 18
    strategy:
      fail-fast: false
      matrix:
        shard: [core, settings, row-actions, media, persistence]
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          persist-credentials: false

      - name: Verify checked-out commit
        if: github.event_name == 'workflow_run'
        shell: bash
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_SHA"

      - name: Install verification tools
        shell: bash
        run: |
          set -euo pipefail
          if command -v rg >/dev/null 2>&1; then
            rg --version
            exit 0
          fi
          if brew tap | /usr/bin/grep -Fxq 'aws/tap'; then
            brew untap aws/tap
          fi
          brew install ripgrep

      - name: Verify noninteractive UI automation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NextPasteFullUI"
          automation_mode_status="$(/usr/bin/automationmodetool)"
          printf '%s\n' "$automation_mode_status" \
            | tee "$RUNNER_TEMP/NextPasteFullUI/automation-mode.log"
          if [[ "$automation_mode_status" != *"DOES NOT REQUIRE"* ]]; then
            echo "error: hosted runner requires interactive UI Automation authorization" >&2
            exit 1
          fi

      - name: Run bounded full UI stage
        timeout-minutes: 14
        shell: bash
        env:
          CI_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteFullUI
          CI_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteDerivedData
        run: Scripts/ci-test.sh --mode full-ui --shard "${{ matrix.shard }}"

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nextpaste-full-ui-shard-${{ matrix.shard }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteFullUI
          if-no-files-found: warn
          retention-days: 14
