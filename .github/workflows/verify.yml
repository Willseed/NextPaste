name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: macos-26
    timeout-minutes: 180
    env:
      VERIFY_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteVerification
      VERIFY_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteDerivedData

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run complete verification
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$VERIFY_ARTIFACTS_DIR"
          Scripts/verify.sh 2>&1 | tee "$VERIFY_ARTIFACTS_DIR/verify.log"

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextpaste-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteVerification
          if-no-files-found: error
          retention-days: 14
