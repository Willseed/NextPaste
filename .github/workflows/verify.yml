name: Verify

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Build and test
    runs-on: macos-26
    # The complete serial macOS UI suite includes the fixed 50/100-action
    # stress workloads and currently takes more than three hours. Keep the
    # blocking suite intact and use GitHub's six-hour hosted-job ceiling.
    timeout-minutes: 360
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install verification tools
        shell: bash
        run: brew install actionlint ripgrep

      - name: Verify noninteractive UI automation
        shell: bash
        run: |
          set -euo pipefail
          automation_mode_status="$(/usr/bin/automationmodetool)"
          printf '%s\n' "$automation_mode_status"
          if [[ "$automation_mode_status" != *"DOES NOT REQUIRE"* ]]; then
            echo "error: hosted runner requires interactive UI Automation authorization" >&2
            exit 1
          fi

      - name: Run complete verification
        shell: bash
        env:
          VERIFY_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteVerification
          VERIFY_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteDerivedData
        run: |
          set -euo pipefail
          mkdir -p "$VERIFY_ARTIFACTS_DIR"
          Scripts/verify.sh 2>&1 | tee "$VERIFY_ARTIFACTS_DIR/verify.log"

      - name: Upload verification results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextpaste-verification-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteVerification
          if-no-files-found: error
          retention-days: 14
