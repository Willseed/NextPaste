name: Verify

on:
  push:
  pull_request:

concurrency:
  group: verify-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Keep the primary blocking job on the latest host-compatible toolchain. The
  # Sequoia compatibility job overrides this with the newest Xcode that runs there.
  DEVELOPER_DIR: /Applications/Xcode_26.4.1.app/Contents/Developer

jobs:
  verify:
    name: Build, unit, integration, and UI smoke
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install verification tools
        shell: bash
        run: |
          set -euo pipefail
          if brew tap | grep -Fxq 'aws/tap'; then
            brew untap aws/tap
          fi
          brew install actionlint ripgrep

      - name: Verify noninteractive UI automation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/NextPasteVerification"
          automation_mode_status="$(/usr/bin/automationmodetool)"
          printf '%s\n' "$automation_mode_status" \
            | tee "$RUNNER_TEMP/NextPasteVerification/automation-mode.log"
          if [[ "$automation_mode_status" != *"DOES NOT REQUIRE"* ]]; then
            echo "error: hosted runner requires interactive UI Automation authorization" >&2
            exit 1
          fi

      - name: Run bounded PR verification
        timeout-minutes: 80
        shell: bash
        env:
          CI_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteVerification
          CI_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteDerivedData
        run: |
          set -euo pipefail
          mkdir -p "$CI_ARTIFACTS_DIR"
          Scripts/ci-test.sh --mode pr

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nextpaste-pr-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteVerification
          if-no-files-found: warn
          retention-days: 14

  sequoia-compatibility:
    name: macOS 15 Sequoia row-action compatibility
    needs: verify
    runs-on: macos-15
    timeout-minutes: 25
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run bounded Sequoia compatibility stage
        timeout-minutes: 21
        shell: bash
        env:
          CI_ARTIFACTS_DIR: ${{ runner.temp }}/NextPasteSequoia
          CI_DERIVED_DATA_PATH: ${{ runner.temp }}/NextPasteSequoiaDerivedData
        run: |
          set -euo pipefail
          mkdir -p "$CI_ARTIFACTS_DIR"
          test "$(sw_vers -productVersion | cut -d. -f1)" = "15"
          Scripts/check-macos-host-compatibility.sh \
            "$CI_ARTIFACTS_DIR/macos-host-compatibility.txt"
          Scripts/ci-test.sh --mode full-ui --shard row-actions

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: nextpaste-sequoia-row-actions-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/NextPasteSequoia
          if-no-files-found: warn
          retention-days: 14
